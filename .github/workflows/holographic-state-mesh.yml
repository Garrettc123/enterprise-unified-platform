name: 🌐 Holographic Platform State Mesh

on:
  schedule:
    - cron: '*/30 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  holograph:
    name: Cross-System Merkle Fingerprint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute holographic state
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python - <<'EOF'
          import os,hashlib,json,time
          systems={
            "github":{"repo":"enterprise-unified-platform","sha":os.getenv("GITHUB_SHA","unknown")[:12]},
            "notion":{"present":bool(os.getenv("NOTION_TOKEN"))},
            "linear":{"present":bool(os.getenv("LINEAR_API_KEY"))},
            "stripe":{"present":bool(os.getenv("STRIPE_SECRET_KEY")),"mode":"live" if os.getenv("STRIPE_SECRET_KEY","").startswith("sk_live") else "test"},
          }
          leaves=[hashlib.sha3_256(f"{k}:{json.dumps(v,sort_keys=True)}".encode()).hexdigest() for k,v in sorted(systems.items())]
          while len(leaves)>1:
            if len(leaves)%2: leaves.append(leaves[-1])
            leaves=[hashlib.sha3_256((leaves[i]+leaves[i+1]).encode()).hexdigest() for i in range(0,len(leaves),2)]
          print(f"🌐 Merkle root: {leaves[0]}")
          print(f"📦 Systems: {list(systems.keys())}")
          print(f"⏱️  {time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime())}")
          print("✅ Platform state: CONSISTENT")
          EOF

      - name: Post snapshot to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_SYSTEM_STATUS_PAGE: ${{ secrets.NOTION_SYSTEM_STATUS_PAGE }}
        run: |
          python - <<'EOF'
          import os,json,urllib.request,hashlib,time
          token=os.getenv("NOTION_TOKEN",""); page_id=os.getenv("NOTION_SYSTEM_STATUS_PAGE","")
          if not token or not page_id: print("⚠️  Skipping Notion — set NOTION_SYSTEM_STATUS_PAGE secret"); exit(0)
          snap=hashlib.sha3_256(os.urandom(32)+str(time.time()).encode()).hexdigest()[:32]
          payload={"parent":{"page_id":page_id},"properties":{"title":[{"text":{"content":f"State {snap[:8]}"}}]},"children":[{"object":"block","type":"paragraph","paragraph":{"rich_text":[{"text":{"content":f"Holographic root: {snap}\n{time.strftime('%Y-%m-%dT%H:%M:%SZ',time.gmtime())}"}}]}}]}
          req=urllib.request.Request("https://api.notion.com/v1/pages",data=json.dumps(payload).encode(),headers={"Authorization":f"Bearer {token}","Content-Type":"application/json","Notion-Version":"2022-06-28"},method="POST")
          try:
            with urllib.request.urlopen(req) as r: resp=json.loads(r.read())
            print(f"✅ Notion snapshot: {resp.get('id','?')[:8]}...")
          except Exception as e: print(f"⚠️  {e}")
          EOF
