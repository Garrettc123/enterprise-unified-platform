name: Auto Revenue Agent

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no alerts fired)'
        required: false
        default: 'false'

jobs:
  revenue-cycle:
    name: Revenue Automation Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install stripe httpx python-jose[cryptography] passlib[bcrypt] \
                      fastapi uvicorn databases[aiosqlite] sqlalchemy pydantic

      - name: Run revenue agent cycle
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_CUSTOMERS_DB_ID: ${{ secrets.NOTION_CUSTOMERS_DB_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python - <<'EOF'
          import asyncio
          import os
          import sys
          import time

          sys.path.insert(0, '.')

          from backend.revenue_agent import (
              RevenueAutomationAgent, Lead, Account, RevenueSnapshot
          )

          async def main():
              agent = RevenueAutomationAgent()
              dry_run = os.environ.get('DRY_RUN', 'false').lower() == 'true'

              leads = [
                  Lead(id='l1', email='cto@enterprise.io', company_size=500,
                       monthly_budget_usd=5000, intent_signals=4, source='referral'),
                  Lead(id='l2', email='founder@startup.co', company_size=12,
                       monthly_budget_usd=800, intent_signals=2, source='organic'),
              ]
              accounts = [
                  Account(id='a1', customer_email='client@corp.com', mrr=2500,
                          days_since_last_login=45, payment_failures_30d=2,
                          feature_usage_score=30, contract_days_remaining=15),
              ]
              now = int(time.time())
              history = [
                  RevenueSnapshot(month=now - 5*30*86400, mrr=8000),
                  RevenueSnapshot(month=now - 4*30*86400, mrr=9500),
                  RevenueSnapshot(month=now - 3*30*86400, mrr=11200),
                  RevenueSnapshot(month=now - 2*30*86400, mrr=13100),
                  RevenueSnapshot(month=now - 1*30*86400, mrr=15400),
                  RevenueSnapshot(month=now, mrr=17800),
              ]

              result = await agent.run_cycle(leads=leads, accounts=accounts, history=history)
              print(f'Revenue cycle complete: {result}')

              slack_url = os.environ.get('SLACK_WEBHOOK_URL', '')
              if slack_url and not dry_run:
                  import httpx
                  forecast = result.get('forecast', {})
                  msg = (
                      f'📊 *Revenue Agent Cycle #{result["cycle"]} Complete*\n'
                      f'• Hot Leads: {result["hot_leads"]}\n'
                      f'• At-Risk Accounts: {result["accounts_at_risk"]}\n'
                      f'• MRR Forecast: ${forecast.get("forecast_mrr", 0):,.2f} '
                      f'({forecast.get("growth_rate_pct", 0):+.1f}% growth)\n'
                      f'• Alerts Fired: {result["alerts_fired"]}\n'
                      f'• Duration: {result["duration_ms"]}ms'
                  )
                  async with httpx.AsyncClient(timeout=8) as client:
                      await client.post(slack_url, json={'text': msg})

          asyncio.run(main())
          EOF

      - name: Health check — ping revenue endpoint
        if: always()
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          URL="${BACKEND_URL:-https://apex-revenue-system.railway.app}"
          echo "Pinging ${URL}/revenue/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${URL}/revenue/health" || echo "000")
          echo "Revenue health status: ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::Revenue health check returned ${STATUS}"
          fi
