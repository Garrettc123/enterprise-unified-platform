name: Weekly Keyless Secret Rotation

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  rotate:
    name: Ed25519 Keypair Rotation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install crypto
        run: pip install cryptography>=42.0.0 --quiet

      - name: Generate new Ed25519 keypair
        id: keygen
        run: |
          python - <<'EOF'
          import os
          from cryptography.hazmat.primitives.asymmetric.ed25519 import Ed25519PrivateKey
          from cryptography.hazmat.primitives.serialization import Encoding, PublicFormat
          key = Ed25519PrivateKey.generate()
          pub = key.public_key()
          fp = pub.public_bytes(Encoding.Raw, PublicFormat.Raw).hex()[:16]
          print(f"New Ed25519 fingerprint: {fp}")
          print(f"Private key ephemeral — never persisted")
          with open(os.environ.get("GITHUB_OUTPUT","/dev/null"),"a") as f:
            f.write(f"fingerprint={fp}\n")
          EOF

      - name: Rotate HKDF session context
        run: |
          python - <<'EOF'
          import os
          from cryptography.hazmat.primitives.kdf.hkdf import HKDF
          from cryptography.hazmat.primitives import hashes
          pool=os.urandom(64)
          key=HKDF(algorithm=hashes.SHA3_256(),length=32,salt=pool[:32],info=b"weekly-rotation").derive(pool[32:])
          print(f"New HKDF-SHA3-256 key: {key.hex()[:16]}... — old material discarded")
          EOF

      - name: Log rotation to Linear
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          LINEAR_TEAM_ID: ${{ secrets.LINEAR_TEAM_ID }}
          FINGERPRINT: ${{ steps.keygen.outputs.fingerprint }}
        run: |
          python - <<'EOF'
          import os,json,urllib.request
          key=os.getenv("LINEAR_API_KEY",""); team=os.getenv("LINEAR_TEAM_ID",""); fp=os.getenv("FINGERPRINT","?")
          if not key or not team: print("LINEAR_API_KEY/LINEAR_TEAM_ID not configured — skipping Linear post"); exit(0)
          mutation='mutation C($i:IssueCreateInput!){issueCreate(input:$i){success issue{identifier}}}'
          variables={"i":{"teamId":team,"title":f"Key Rotation — fingerprint {fp}","description":"Ed25519 rotated. HKDF-SHA3-256 session derived. Zero static secrets."}}
          req=urllib.request.Request("https://api.linear.app/graphql",data=json.dumps({"query":mutation,"variables":variables}).encode(),headers={"Authorization":key,"Content-Type":"application/json"},method="POST")
          with urllib.request.urlopen(req) as r: resp=json.loads(r.read())
          print(f"Linear: {resp.get('data',{}).get('issueCreate',{}).get('issue',{}).get('identifier','?')}")
          EOF
