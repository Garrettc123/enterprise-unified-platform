name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn sqlalchemy[asyncio] aiosqlite pydantic[email] \
          python-jose[cryptography] passlib[bcrypt] python-multipart aiofiles \
          pytest pytest-asyncio pytest-cov httpx

    - name: Run tests
      run: pytest backend/tests/ -v --cov=backend --cov-report=xml --override-ini="addopts="
      env:
        DATABASE_URL: sqlite+aiosqlite:///:memory:

    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
      continue-on-error: true

  test-frontend:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: cd frontend && npm install

    - name: Run tests
      run: |
        if find frontend/src -name "*.test.*" -o -name "*.spec.*" | grep -q .; then
          cd frontend && npm test
        else
          echo "No frontend test files found, skipping"
        fi

    - name: Build
      run: cd frontend && npm run build
