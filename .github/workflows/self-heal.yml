name: 🩺 Self-Heal — Validate & Fix Blockers
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Python deps
        run: |
          [ -f requirements.txt ] && pip install -r requirements.txt -q || echo "No requirements.txt"
        continue-on-error: true
      - name: Node deps
        run: |
          [ -f package.json ] && npm install --prefer-offline 2>&1 | tail -3 || echo "No package.json"
        continue-on-error: true
      - name: Validate workflow YAML
        run: |
          pip install pyyaml -q
          python3 << 'PYEOF'
          import os, yaml
          errors = []
          for fn in os.listdir('.github/workflows'):
              if fn.endswith(('.yml','.yaml')):
                  try: yaml.safe_load(open(f'.github/workflows/{fn}')); print(f'  OK {fn}')
                  except yaml.YAMLError as e: errors.append(fn); print(f'  ERR {fn}: {e}')
          print(f'Result: {len(errors)} errors')
          PYEOF
        continue-on-error: true
      - name: Done
        run: echo "Self-heal done $(date -u)"
